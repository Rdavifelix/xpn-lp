<!DOCTYPE html>
<!--
  MÁQUINA DE REUNIÕES · Página de obrigado / bônus (pós-compra)
  Identidade: dossiê dark editorial da "Formatos que Agendam" (Geist + Instrument Serif + JetBrains Mono, acento laranja).
  Estrutura enxuta inspirada em página de obrigado: confirmação + convite + formulário incorporado (Respondi).
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Compra confirmada · Máquina de Reuniões</title>
<link rel="icon" type="image/png" sizes="256x256" href="assets/favicon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
<link rel="apple-touch-icon" href="assets/favicon.png" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0A0908; --s1:#0F0E0C; --s2:#141210; --s3:#1C1A17; --s4:#231F1A;
  --border:#2A251E; --border-soft:#1B1813;
  --text:#F4EFE7; --text-2:#9A9087; --text-3:#5C554C;
  --orange:#E5782A; --orange-bright:#FF8F45; --orange-dim:#B85F1E; --orange-deep:#8A4514;
  --green:#5BAE7B;
  --serif:'Instrument Serif','Times New Roman',serif;
  --sans:'Geist',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --maxw:1180px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  font-weight:400;line-height:1.6;letter-spacing:-0.005em;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow-x:hidden;min-height:100vh;
}
::selection{background:var(--orange);color:#100B06}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:0.16em;font-size:11px}
em{font-style:normal;color:var(--orange);font-family:var(--sans);font-weight:inherit}

/* ── fundo: brilho superior laranja + véu ── */
.bg-glow{position:fixed;z-index:0;width:900px;height:900px;left:50%;top:-38%;transform:translateX(-50%);
  background:radial-gradient(circle,rgba(229,120,42,.14),transparent 62%);filter:blur(24px);pointer-events:none}
.bg-veil{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 0%,rgba(10,9,8,0) 0%,rgba(10,9,8,.65) 70%,var(--bg) 100%)}

/* logo (usada só no rodapé) */
.logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text)}
.logo .dot{width:7px;height:7px;border-radius:50%;background:var(--orange);box-shadow:0 0 10px var(--orange);animation:pulse 2.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ═══════════════ MAIN ═══════════════ */
main{position:relative;z-index:2}
.shell{max-width:660px;margin:0 auto;padding:clamp(40px,7vw,72px) 28px clamp(70px,10vw,120px);text-align:center}

/* selo de confirmação (ícone, sem texto) */
.check{
  width:64px;height:64px;border-radius:50%;margin:0 auto clamp(24px,3.4vw,34px);
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 40%,rgba(91,174,123,.22),rgba(91,174,123,.06));
  border:1px solid rgba(91,174,123,.4);
  box-shadow:0 0 0 6px rgba(91,174,123,.05),0 16px 40px -16px rgba(91,174,123,.5);
}
.check svg{width:30px;height:30px}
.check svg path{stroke:var(--green);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:40;stroke-dashoffset:40;animation:draw 1s var(--ease) .25s forwards}
@keyframes draw{to{stroke-dashoffset:0}}

h1{
  font-family:var(--sans);font-weight:700;
  font-size:clamp(38px,6.4vw,68px);line-height:1;letter-spacing:-0.035em;
  margin:0 auto;
}
.lead{
  margin:clamp(20px,2.6vw,28px) auto 0;max-width:34ch;
  font-size:clamp(17px,2vw,20px);line-height:1.55;color:var(--text-2);
}
.lead b{color:var(--text);font-weight:500}

/* ═══════════════ VÍDEO ═══════════════ */
.video-wrap{margin:clamp(30px,4.4vw,48px) auto 0;max-width:600px}
.video-player{
  width:100%;aspect-ratio:16/9;display:block;object-fit:cover;background:#000;
  border:1px solid var(--border);border-radius:10px;
  box-shadow:0 30px 70px -34px rgba(0,0,0,.8);
}

/* ═══════════════ FORM ═══════════════ */
.form-intro{margin:clamp(38px,5.4vw,58px) auto 0;max-width:46ch;
  font-size:clamp(16px,1.9vw,19px);line-height:1.55;color:var(--text-2)}
.form-intro b{color:var(--text);font-weight:600}
.form-wrap{margin:clamp(20px,2.6vw,28px) auto 0;max-width:600px}
.form-card{
  position:relative;background:var(--s1);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  box-shadow:0 40px 90px -40px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.02);
}
.form-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.7;z-index:2}
.form-card [data-respondi-container]{min-height:400px}
.form-card iframe{width:100%!important;border:none;display:block;background:transparent}

/* ── MOBILE: ordem natural (texto primeiro, formulário por último) + compacto ── */
@media(max-width:640px){
  .shell{padding:26px 22px 64px}
  .check{width:50px;height:50px;margin:0 auto 12px}
  .check svg{width:23px;height:23px}
  h1{font-size:clamp(29px,8.4vw,36px);line-height:1.02}
  .lead{margin-top:11px;font-size:15.5px;line-height:1.45;max-width:32ch}
  .form-intro{margin-top:32px;font-size:16px}
  .form-wrap{margin-top:16px}
}

/* rodapé (igual ao da página Formatos) */
footer{position:relative;z-index:2;border-top:1px solid var(--border-soft);padding:40px 0}
.foot-in{max-width:660px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;text-align:center}
footer .logo{font-size:11px}
footer .meta{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);line-height:1.8}

/* reveal */
.rev{opacity:0;transform:translateY(16px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.rev.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.rev{opacity:1;transform:none}.check svg path{animation:none;stroke-dashoffset:0}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-veil"></div>

<main>
  <div class="shell">

    <div class="check rev">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 12.5l5 5 10-11" /></svg>
    </div>

    <h1 class="rev">Compra Confirmada.</h1>

    <p class="lead rev">Assista ao vídeo abaixo para entender como liberar seu <b>Bônus único</b>:</p>

    <div class="video-wrap rev">
      <video class="video-player" controls preload="metadata" playsinline poster="assets/obrigado-poster.jpg">
        <source src="assets/obrigado-video.mp4" type="video/mp4" />
        Seu navegador não suporta vídeo HTML5.
      </video>
    </div>

    <p class="form-intro rev">Para garantir de fato essa análise, responda <b>da forma mais completa possível</b> as seguintes perguntas:</p>

    <div class="form-wrap rev">
      <div class="form-card">
        <div data-respondi-container="" data-respondi-mode="regular" data-respondi-src="https://form.respondi.app/9qqyjIRG" data-respondi-width="100%" data-respondi-height="400px"></div>
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="foot-in">
    <div class="meta">© 2026 João Araújo · XPN Digital · Todos os direitos reservados</div>
  </div>
</footer>

<script>
/* reveal on scroll */
const io=new IntersectionObserver((es)=>{
  es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})
},{threshold:.12,rootMargin:'0px 0px -8% 0px'});
document.querySelectorAll('.rev').forEach((el,i)=>{el.style.transitionDelay=(i*70)+'ms';io.observe(el)});
</script>

<!-- Embed oficial do Respondi (faz o auto-resize do formulário) -->
<script>
const bodyScript=document.querySelector('body'),hasScript=document.querySelector('#respondi_src');
if(!hasScript){const script=document.createElement('script');script.setAttribute("async","");document.body.appendChild(script),script.id='respondi_src',script.src='https://embed.respondi.app/embed.js';}
</script>
</body>
</html>
